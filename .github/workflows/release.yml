name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build release assets
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare Windows runner folders
        shell: pwsh
        run: |
          $pubCache = Join-Path $env:RUNNER_TEMP "pub-cache"
          $cargoHome = Join-Path $env:RUNNER_TEMP "cargo"

          $paths = @(
            "$env:USERPROFILE\AppData",
            "$env:USERPROFILE\AppData\Local",
            "$env:USERPROFILE\AppData\Roaming",
            $pubCache,
            $cargoHome
          )
          foreach ($path in $paths) {
            New-Item -ItemType Directory -Force -Path $path | Out-Null
          }

          "PUB_CACHE=$pubCache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CARGO_HOME=$cargoHome" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Package release
        shell: pwsh
        run: .\scripts\package_release.ps1 -Flutter flutter

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/v*/*
